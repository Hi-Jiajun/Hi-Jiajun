name: Update Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - README.template.md
      - profile-data.yml
      - scripts/generate_readme.py
      - assets/profile-banner.svg
      - .github/workflows/update-profile.yml

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip PyYAML Pillow

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate_readme.py --config profile-data.yml --template README.template.md --output README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/generated/profile-hero.gif
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh profile README"
          git push

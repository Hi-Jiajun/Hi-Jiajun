<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi-Jiajun profile banner</title>
  <desc id="desc">A polished profile banner for Hi-Jiajun focused on automation, tools, workflows, and experiments.</desc>
  <defs>

      <stop stop-color="#09121E"/>
      <stop offset="0.52" stop-color="#10253B"/>
      <stop offset="1" stop-color="#1C5D66"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 82) rotate(24) scale(320 170)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1048 92) rotate(154) scale(360 180)">
      <stop stop-color="#2DD4BF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="white" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1264" height="284" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="284" rx="28" fill="url(#glowLeft)"/>
  <rect x="8" y="8" width="1264" height="284" rx="28" fill="url(#glowRight)"/>
  <rect x="8" y="8" width="1264" height="284" rx="28" fill="url(#grid)"/>
  <rect x="8.5" y="8.5" width="1263" height="283" rx="27.5" stroke="white" stroke-opacity="0.12"/>


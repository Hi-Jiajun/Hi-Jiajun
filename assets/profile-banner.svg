<svg width="1280" height="260" viewBox="0 0 1280 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi-Jiajun profile banner</title>
  <desc id="desc">A minimal profile banner for Hi-Jiajun focused on automation, tools, and workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="36" y1="20" x2="1244" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111E"/>
      <stop offset="0.58" stop-color="#102338"/>
      <stop offset="1" stop-color="#184B54"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 74) rotate(160) scale(320 170)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="white" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1264" height="244" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="244" rx="28" fill="url(#glow)"/>
  <rect x="8" y="8" width="1264" height="244" rx="28" fill="url(#grid)"/>
  <rect x="8.5" y="8.5" width="1263" height="243" rx="27.5" stroke="white" stroke-opacity="0.12"/>

  <text x="72" y="68" fill="#8DD4FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">
    HI-JIAJUN / SOLO BUILDER
  </text>
  <text x="72" y="126" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">
    Automation, tools,
  </text>
  <text x="72" y="180" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">
    and AI workflows
  </text>
  <text x="72" y="220" fill="#D4E7F5" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Original projects, useful forks, and practical workflow experiments
  </text>

  <g transform="translate(930 66)">
    <rect width="220" height="128" rx="24" fill="rgba(255,255,255,0.04)"/>
    <rect x="0.75" y="0.75" width="218.5" height="126.5" rx="23.25" stroke="rgba(255,255,255,0.10)"/>
    <rect x="28" y="28" width="60" height="8" rx="4" fill="#38BDF8"/>
    <rect x="28" y="56" width="126" height="10" rx="5" fill="#38BDF8"/>
    <rect x="28" y="84" width="60" height="8" rx="4" fill="#2DD4BF"/>
    <rect x="28" y="112" width="150" height="10" rx="5" fill="#2DD4BF"/>
  </g>
</svg>

<svg width="1280" height="280" viewBox="0 0 1280 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi-Jiajun profile banner</title>
  <desc id="desc">A minimal banner for Hi-Jiajun's GitHub profile focused on tools, scripts, and workflow experiments.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1240" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08121F"/>
      <stop offset="0.55" stop-color="#0B2235"/>
      <stop offset="1" stop-color="#0F5F66"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 70) rotate(140) scale(360 160)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="white" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1264" height="264" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="1264" height="264" rx="26" fill="url(#glow)"/>
  <rect x="8" y="8" width="1264" height="264" rx="26" fill="url(#grid)"/>
  <rect x="8.5" y="8.5" width="1263" height="263" rx="25.5" stroke="white" stroke-opacity="0.12"/>

  <text x="72" y="74" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">
    HI-JIAJUN / PERSONAL WORKSHOP
  </text>
  <text x="72" y="132" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    Tools, scripts, and
  </text>
  <text x="72" y="178" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    workflow experiments
  </text>
  <text x="72" y="220" fill="#D7E9F6" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Original projects, forks I learn from, and things I am currently exploring.
  </text>

  <g transform="translate(72 236)">
    <rect width="98" height="24" rx="12" fill="#0F2740"/>
    <rect x="0.75" y="0.75" width="96.5" height="22.5" rx="11.25" stroke="#38BDF8" stroke-opacity="0.28"/>
    <text x="20" y="16" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">AUTOMATION</text>

    <rect x="110" width="102" height="24" rx="12" fill="#0F2740"/>
    <rect x="110.75" y="0.75" width="100.5" height="22.5" rx="11.25" stroke="#38BDF8" stroke-opacity="0.28"/>
    <text x="135" y="16" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">AI WORKFLOWS</text>

    <rect x="224" width="94" height="24" rx="12" fill="#0F2740"/>
    <rect x="224.75" y="0.75" width="92.5" height="22.5" rx="11.25" stroke="#38BDF8" stroke-opacity="0.28"/>
    <text x="249" y="16" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">NETWORKING</text>
  </g>
</svg>

profile:
  username: Hi-Jiajun
  header_title: "Hi, I'm Hi-Jiajun 👋"
  header_role_zh: "个人开发者"
  header_role_en: "Solo builder"
  header_intro_zh: "🛠️ 我把 GitHub 当成公开工作台，放自制工具、脚本、实验项目，也放我学习、适配、参考过的 fork。"
  header_intro_en: "I use GitHub as a public workshop for tools, scripts, experiments, and forks I learn from."
  ownership_note_zh: "ℹ️ 这里不是所有仓库都由我从零构建。"
  ownership_note_en: "Some are original, some are forks I use, study, or adapt."
  footer_zh: "✨ 先做对自己有用的东西，也希望它们对别人有用。"
  footer_en: "Building things useful to me first, and hopefully useful to others too."

about:
  - icon: "🤖"
    zh: "AI 辅助工作流与 Agent 工具"
    en: "AI-assisted workflows and agent tooling"
  - icon: "🌐"
    zh: "网络、路由和域名规则相关工具"
    en: "Networking, routing, and domain-rule tooling"
  - icon: "⚙️"
    zh: "把重复的日常工作沉淀成脚本和流程"
    en: "Turning repeated work into scripts and workflows"
  - icon: "🧪"
    zh: "在真实开发和运维场景里测试 AI 工具"
    en: "Testing AI tools in real dev and ops tasks"
  - icon: "🌱"
    zh: "少堆 demo，多维护真正还在用的项目"
    en: "Fewer half-finished demos, more alive projects"
  - icon: "🤝"
    zh: "通过 fork、适配，偶尔向上游贡献来学习"
    en: "Learning by forking, adapting, sometimes contributing back"


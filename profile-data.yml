profile:
  username: Hi-Jiajun
  header_title: "Hi, I'm Hi-Jiajun 👋"
  header_role: "🧑‍💻 个人开发者 / Solo builder"
  header_intro_zh: "🛠️ 我把 GitHub 当成公开工作台，放一些自己做的小工具、脚本、实验项目，也放一些我会学习、适配和参考的 fork。"
  header_intro_en: "🛠️ I use GitHub as a public workshop for tools, scripts, experiments, and forks that I learn from or adapt for my own workflow."
  ownership_note_zh: "ℹ️ 不是这里的每个仓库都由我从零开始构建。"
  ownership_note_en: "ℹ️ Some are original projects, and some are forks I use, study, adapt, or contribute to."
  footer_zh: "✨ 先做对自己有用的东西，也希望它们对别人也有帮助。"
  footer_en: "✨ Building things that are useful to me first, and hopefully useful to others too."

section_copy:
  about_intro_zh: "我主要会关注这些方向："
  about_intro_en: "I am mostly interested in:"
  original_intro_zh: "这些仓库更接近我自己主导或直接维护的内容。"
  original_intro_en: "These repositories are the closest to my own work or direct maintenance."
  forks_intro_zh: "这些仓库会出现在这里，是因为我在使用、学习、适配，或者围绕它们做过一些贡献。"
  forks_intro_zh_extra: "我不想把它们写成“完全由我原创开发的项目”。"
  forks_intro_en: "These repositories are here because I use them, study them, adapt them, or have contributed something around them."
  recent_intro_zh: "这部分会根据仓库最近的推送时间自动刷新。"
  recent_intro_en: "This section refreshes automatically based on recent repository activity."

